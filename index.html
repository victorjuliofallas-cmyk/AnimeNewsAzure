<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>AnimeNewsAzure - Victor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>AnimeNews<span>Azure</span></h1>
            <p>Tu portal de noticias de anime</p>
        </div>
    </header>

    <main class="container">
        <section id="noticias-seccion">
            <h2 class="section-title">📰 Últimas Noticias</h2>
            <div class="grid-container">
                <div class="card">
                    <img src="https://cdn.myanimelist.net/images/anime/1015/138006l.jpg" alt="Noticia">
                    <div class="card-content">
                        <h3>El manga JM tendrá adaptación al anime</h3>
                        <p style="color: #ccc; font-size: 0.9em;">Una nueva comedia de intercambio de cuerpos del creador de Hinamatsuri.</p>
                        <a href="https://myanimelist.net/news" target="_blank" class="btn">Leer completa</a>
                    </div>
                </div>
            </div>
        </section>

        <hr>

        <section id="estrenos-seccion">
            <h2 class="section-title">🔥 Estrenos de Temporada</h2>
            <div id="contenedor-estrenos" class="grid-container">
                <p>Cargando datos...</p>
            </div>
        </section>

        <hr>

        <section id="trailers-seccion">
            <h2 class="section-title">🎬 Trailers</h2>
            <div id="contenedor-trailers" class="grid-container">
                <p>Buscando videos...</p>
            </div>
        </section>
    </main>

    <script>
        // Función para cargar los JSON con manejo de errores
        async function cargarDatos(archivo, contenedorId, esVideo = false) {
            const contenedor = document.getElementById(contenedorId);
            try {
                const response = await fetch(archivo);
                if (!response.ok) throw new Error("No encontrado");
                const data = await response.json();
                contenedor.innerHTML = '';

                data.forEach(item => {
                    if (esVideo) {
                        let videoId = item.video.includes('v=') ? item.video.split('v=')[1].split('&')[0] : item.video.split('be/')[1];
                        contenedor.innerHTML += `
                            <div class="card">
                                <div class="video-container">
                                    <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                                </div>
                                <div class="card-content"><h3>${item.titulo}</h3></div>
                            </div>`;
                    } else {
                        contenedor.innerHTML += `
                            <div class="card">
                                <img src="${item.imagen}" alt="${item.titulo}" referrerpolicy="no-referrer">
                                <div class="card-content">
                                    <h3>${item.titulo}</h3>
                                    <p style="font-size: 0.8em; color: #ccc;">${item.sinopsis || ''}</p>
                                    <a href="${item.link}" target="_blank" class="btn">Ver más</a>
                                </div>
                            </div>`;
                    }
                });
            } catch (e) {
                contenedor.innerHTML = `<p style="color:red;">Error: Asegúrate de que el archivo ${archivo} exista en GitHub.</p>`;
            }
        }

        cargarDatos('estrenos.json', 'contenedor-estrenos');
        cargarDatos('trailers.json', 'contenedor-trailers', true);
    </script>
</body>
</html>
