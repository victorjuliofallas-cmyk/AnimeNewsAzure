<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeNewsAzure - El Portal de Victor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .anime-card, .trailer-card, .noticia-card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid #333;
        }
        .anime-card:hover, .noticia-card:hover { transform: scale(1.03); }
        .anime-card img, .noticia-card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>AnimeNews<span>Azure</span></h1>
            <p>Tu portal de noticias de anime en tiempo real</p>
        </div>
    </header>

    <main class="container">
        <section id="noticias-seccion">
            <h2 class="section-title">📰 Últimas Noticias</h2>
            <div id="contenedor-noticias" class="grid-container">
                <p>Cargando noticias...</p>
            </div>
        </section>

        <hr style="border: 1px solid #333; margin: 40px 0;">

        <section id="estrenos-seccion">
            <h2 class="section-title">🔥 Estrenos de la Temporada</h2>
            <div id="contenedor-estrenos" class="grid-container">
                <p>Invocando animes...</p>
            </div>
        </section>

        <hr style="border: 1px solid #333; margin: 40px 0;">

        <section id="trailers-seccion">
            <h2 class="section-title">🎬 Últimos Trailers Oficiales</h2>
            <div id="contenedor-trailers" class="grid-container">
                <p>Buscando trailers...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 AnimeNewsAzure - Proyecto de Victor Julio Fallas Arroyo</p>
    </footer>

    <script>
        // TRUCO DEFINITIVO PARA LAS IMÁGENES (Usa un servidor espejo)
        function obtenerImagenSegura(url) {
            if (!url) return '';
            return `https://images.weserv.nl/?url=${url}`;
        }

        // CARGAR NOTICIAS
        fetch('noticias.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-noticias');
                contenedor.innerHTML = '';
                if (!data || data.length === 0) {
                    contenedor.innerHTML = '<p>No hay noticias por ahora.</p>';
                    return;
                }
                data.forEach(noticia => {
                    const card = document.createElement('div');
                    card.className = 'noticia-card';
                    card.innerHTML = `
                        <img src="${obtenerImagenSegura(noticia.imagen)}" alt="Noticia">
                        <div class="card-content">
                            <h3>${noticia.titulo}</h3>
                            <a href="${noticia.link}" target="_blank" class="btn">Leer completa</a>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            }).catch(() => document.getElementById('contenedor-noticias').innerHTML = '<p>No hay archivo noticias.json cargado aún.</p>');

        // CARGAR TODOS LOS ESTRENOS
        fetch('estrenos.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-estrenos');
                contenedor.innerHTML = ''; 
                data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.innerHTML = `
                        <img src="${obtenerImagenSegura(anime.imagen)}" alt="${anime.titulo}">
                        <div class="card-content">
                            <h3>${anime.titulo}</h3>
                            <p style="font-size: 0.9em; color: #ccc; margin-bottom: 15px;">${anime.sinopsis}</p>
                            <a href="${anime.link}" target="_blank" class="btn">Detalles en MAL</a>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            });

        // CARGAR TODOS LOS TRAILERS
        fetch('trailers.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-trailers');
                contenedor.innerHTML = '';
                
                if (data.length === 0) {
                    contenedor.innerHTML = '<p>No hay trailers en el archivo JSON actualmente.</p>';
                    return;
                }

                data.forEach(trailer => {
                    const card = document.createElement('div');
                    card.className = 'trailer-card';
                    
                    // Lógica correcta para YouTube
                    let videoId = "";
                    if (trailer.video.includes('v=')) {
                        videoId = trailer.video.split('v=')[1].split('&')[0];
                    } else if (trailer.video.includes('youtu.be/')) {
                        videoId = trailer.video.split('youtu.be/')[1].split('?')[0];
                    }

                    card.innerHTML = `
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="card-content">
                            <h3>${trailer.titulo}</h3>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            });
    </script>
</body>
</html>
