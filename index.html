<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeNewsAzure - Estrenos de Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>AnimeNews<span>Azure</span></h1>
            <p>Tu portal de noticias de anime en tiempo real</p>
        </div>
    </header>

    <main class="container">
        <section id="estrenos-seccion">
            <h2>Estrenos de Temporada</h2>
            <div id="contenedor-estrenos" class="grid-container">
                <p>Cargando estrenos...</p>
            </div>
        </section>

        <hr>

        <section id="trailers-seccion">
            <h2>Nuevos Trailers</h2>
            <div id="contenedor-trailers" class="grid-container">
                <p>Buscando trailers nuevos...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AnimeNewsAzure - Proyecto de Victor Julio Fallas</p>
    </footer>

    <script>
        // Función para cargar Estrenos
        fetch('estrenos.json')
            .then(response => response.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-estrenos');
                contenedor.innerHTML = ''; // Limpiamos el texto de carga

                data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    
                    // IMPORTANTE: Aquí agregamos el referrerpolicy="no-referrer"
                    card.innerHTML = `
                        <img src="${anime.imagen}" alt="${anime.titulo}" referrerpolicy="no-referrer">
                        <h3>${anime.titulo}</h3>
                        <p>${anime.sinopsis}</p>
                        <a href="${anime.link}" target="_blank" class="btn">Ver más</a>
                    `;
                    contenedor.appendChild(card);
                });
            })
            .catch(err => console.error("Error cargando estrenos:", err));

        // Función para cargar Trailers
        fetch('trailers.json')
            .then(response => response.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-trailers');
                contenedor.innerHTML = '';

                if(data.length === 0) {
                    contenedor.innerHTML = '<p>No hay trailers nuevos disponibles por ahora.</p>';
                    return;
                }

                data.forEach(trailer => {
                    const card = document.createElement('div');
                    card.className = 'trailer-card';
                    
                    // Convertimos el link normal de YT en uno que se pueda ver (embed)
                    const videoId = trailer.video.split('v=')[1]?.split('&')[0] || "";
                    const embedUrl = `https://www.youtube.com/embed/${videoId}`;

                    card.innerHTML = `
                        <div class="video-responsive">
                            <iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <h3>${trailer.titulo}</h3>
                    `;
                    contenedor.appendChild(card);
                });
            })
            .catch(err => console.error("Error cargando trailers:", err));
    </script>
</body>
</html>
