<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>AnimeNewsAzure - El Portal de Victor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>AnimeNews<span>Azure</span></h1>
            <p>Tu portal de noticias de anime en tiempo real</p>
        </div>
    </header>

    <main class="container">
        <section id="noticias-seccion">
            <h2 class="section-title">📰 Últimas Noticias</h2>
            <div id="contenedor-noticias" class="grid-container">
                <p>Cargando noticias...</p>
            </div>
        </section>
        <hr>
        <section id="estrenos-seccion">
            <h2 class="section-title">🔥 Estrenos de la Temporada</h2>
            <div id="contenedor-estrenos" class="grid-container">
                <p>Cargando animes...</p>
            </div>
        </section>
        <hr>
        <section id="trailers-seccion">
            <h2 class="section-title">🎬 Nuevos Trailers</h2>
            <div id="contenedor-trailers" class="grid-container">
                <p>Buscando trailers...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-text">
            <p>© 2026 AnimeNewsAzure - Victor Julio Fallas Arroyo</p>
        </div>
    </footer>

    <script>
        // 1. CARGAR NOTICIAS
        fetch('noticias.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-noticias');
                contenedor.innerHTML = '';
                data.forEach(noticia => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <img src="${noticia.imagen}" alt="Noticia">
                            <div class="card-content">
                                <h3>${noticia.titulo}</h3>
                                <a href="${noticia.link}" target="_blank" class="btn">Leer completa</a>
                            </div>
                        </div>
                    `;
                });
            }).catch(() => document.getElementById('contenedor-noticias').innerHTML = '<p>No hay noticias por el momento.</p>');

        // 2. CARGAR ESTRENOS
        fetch('estrenos.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-estrenos');
                contenedor.innerHTML = ''; 
                data.forEach(anime => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <img src="${anime.imagen}" alt="${anime.titulo}">
                            <div class="card-content">
                                <h3>${anime.titulo}</h3>
                                <p style="font-size: 0.9em; color: #ccc; margin-bottom: 15px;">${anime.sinopsis}</p>
                                <a href="${anime.link}" target="_blank" class="btn">Ver más</a>
                            </div>
                        </div>
                    `;
                });
            });

        // 3. CARGAR TRAILERS (¡Con el link de YouTube 100% arreglado!)
        fetch('trailers.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-trailers');
                contenedor.innerHTML = '';
                data.forEach(trailer => {
                    let videoId = "";
                    if (trailer.video.includes('v=')) {
                        videoId = trailer.video.split('v=')[1].split('&')[0];
                    } else if (trailer.video.includes('youtu.be/')) {
                        videoId = trailer.video.split('youtu.be/')[1].split('?')[0];
                    }
                    
                    // ESTE ES EL LINK OFICIAL CORRECTO
                    let iframeSrc = videoId ? `https://www.youtube.com/embed/${videoId}` : trailer.video;

                    contenedor.innerHTML += `
                        <div class="card">
                            <div class="video-container">
                                <iframe src="${iframeSrc}" frameborder="0" allowfullscreen></iframe>
                            </div>
                            <div class="card-content">
                                <h3>${trailer.titulo}</h3>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
